# Server
server.port=8080
server.address=0.0.0.0

# Spring Application
spring.application.name=NeuroForge Enterprise SDLC Platform
spring.config.import=optional:file:.env[.properties]


# Client URL
webapp.origin=${WEBAPP_ORIGIN}


# Datasource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# JWT configuration (development values - replace in production)
security.jwt.secret=${JWT_SECRET}
security.jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS}
security.jwt.refresh-token-expiration-seconds=${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS}

# JWT Secure Cookie Configuration
# Cookie names for access and refresh tokens
security.jwt.cookie.access-token-name=accessToken
security.jwt.cookie.refresh-token-name=refreshToken

# HttpOnly prevents JavaScript access (prevents XSS attacks)
security.jwt.cookie.http-only=true

# Secure flag ensures cookies are only sent over HTTPS (set to false in development if not using HTTPS)
security.jwt.cookie.secure=${JWT_COOKIE_SECURE}

# SameSite protection against CSRF attacks (Strict/Lax/None)
security.jwt.cookie.same-site=${JWT_COOKIE_SAME_SITE}

# Cookie path
security.jwt.cookie.path=/

# Logging
logging.level.root=INFO
logging.level.com.neuroforge=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.defaults.enabled=false
management.health.livenessState.enabled=true
management.health.db.enabled=false
management.health.redis.enabled=false


